name: Deploy to Dev Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy theme files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.php,*.css,js/*,images/*"
          target: /opt/bitnami/wordpress/wp-content/themes/policycentral/

      - name: Fix permissions and clear cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R bitnami:daemon /opt/bitnami/wordpress/wp-content/themes/policycentral/
            sudo chmod -R 755 /opt/bitnami/wordpress/wp-content/themes/policycentral/
