name: Deploy to Production Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy theme files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "*.php,*.css,*.svg,*.png,*.ico,*.webmanifest,js/*,images/*,includes/*,assets/*,template-parts/*"
          target: /opt/bitnami/wordpress/wp-content/themes/policycentral/

      - name: Fix permissions, run migrations, clear cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -e
            sudo chown -R bitnami:daemon /opt/bitnami/wordpress/wp-content/themes/policycentral/
            sudo chmod -R 755 /opt/bitnami/wordpress/wp-content/themes/policycentral/
            cd /opt/bitnami/wordpress
            sudo wp eval 'pcgpt_run_migrations();' --allow-root
            echo "pcgpt_migration_version=$(sudo wp option get pcgpt_migration_version --allow-root)"
